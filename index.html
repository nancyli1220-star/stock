<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日選股指南</title>
<style>
:root { --bg:#0a0c10; --bg2:#0f1318; --bg3:#141920; --bg4:#1a2030; --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --accent:#f0b429; --green:#30c97e; --red:#f05252; --blue:#4fa3f7; --orange:#f0824e; --muted:#5a6478; --text:#e8ecf4; --text2:#8a95a8; }
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang TC",sans-serif;font-size:13px;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:10;}
.logo-text{font-size:16px;font-weight:700;}
.logo-sub{font-size:10px;color:var(--muted);}
.refresh-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.refresh-btn:disabled{opacity:0.5;}
.update-time{background:rgba(48,201,126,0.1);border:1px solid rgba(48,201,126,0.3);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--green);}
.banner{padding:10px 16px;font-size:12px;display:none;}
.banner.show{display:block;}
.banner.loading{background:rgba(79,163,247,0.1);color:var(--blue);}
.banner.success{background:rgba(48,201,126,0.1);color:var(--green);}
.banner.error{background:rgba(240,82,82,0.1);color:var(--red);}
.hero{padding:18px 16px;background:#0f1820;border-bottom:1px solid var(--border);}
.hero-title{font-size:11px;font-weight:700;letter-spacing:0.15em;color:var(--accent);margin-bottom:14px;}
.top-recs{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:900px){.top-recs{grid-template-columns:1fr;}}
.rec-panel{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;}
.rec-panel.strong{border-color:rgba(240,82,82,0.3);}
.rec-panel.dt{border-color:rgba(240,130,78,0.3);}
.rec-header{display:flex;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.rec-type{font-size:13px;font-weight:700;}
.rec-type.s{color:var(--red);}
.rec-type.d{color:var(--orange);}
.rec-count{font-size:10px;color:var(--muted);}
.rec-list{display:flex;flex-direction:column;gap:6px;}
.rec-item{display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:center;padding:9px 12px;background:rgba(255,255,255,0.02);border-radius:6px;}
.rec-rank{width:22px;height:22px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rec-rank.r1{background:var(--accent);color:#000;}
.rec-name{font-size:14px;font-weight:700;}
.rec-meta{font-size:10px;color:var(--muted);}
.rec-score{font-size:14px;font-weight:700;padding:3px 9px;background:rgba(240,180,41,0.15);color:var(--accent);border-radius:4px;}
.rec-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px;border:1px dashed var(--border2);border-radius:6px;}
.main{padding:18px 16px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:700px){.stats{grid-template-columns:repeat(3,1fr);}}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;}
.stat-v{font-size:22px;font-weight:700;}
.stat-l{font-size:10px;color:var(--muted);margin-top:4px;}
.section-h{display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;align-items:center;}
.tabs{display:flex;gap:3px;background:var(--bg3);border-radius:8px;padding:3px;flex-wrap:wrap;}
.tab{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:none;}
.tab.active{background:var(--accent);color:#000;}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:auto;max-height:60vh;}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px;}
thead th{font-size:10px;font-weight:700;color:var(--muted);padding:10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border2);background:var(--bg2);position:sticky;top:0;}
thead th.left{text-align:left;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr.pri{background:rgba(240,180,41,0.04);}
tbody td{padding:10px;font-size:12px;text-align:right;white-space:nowrap;}
tbody td.left{text-align:left;}
.name{font-size:13px;font-weight:700;}
.code{font-size:9px;color:var(--muted);}
.pos{color:var(--red);}
.neg{color:var(--green);}
.zero{color:var(--muted);}
.score-b{display:inline-block;min-width:32px;padding:4px 6px;border-radius:6px;font-weight:700;font-size:13px;text-align:center;}
.s-9{background:rgba(240,82,82,0.22);color:var(--red);}
.s-7{background:rgba(240,180,41,0.22);color:var(--accent);}
.s-5{background:rgba(48,201,126,0.12);color:var(--green);}
.s-l{background:rgba(90,100,120,0.12);color:var(--muted);}
.tag{display:inline-block;padding:2px 7px;font-size:10px;font-weight:600;border-radius:4px;}
.t-buy{background:rgba(240,82,82,0.15);color:var(--red);}
.t-watch{background:rgba(79,163,247,0.1);color:var(--blue);}
.t-skip{color:var(--muted);}
.info{background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:14px;font-size:11px;color:var(--text2);line-height:1.6;}
.info b{color:var(--accent);}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo-text">📊 每日選股指南</div>
    <div class="logo-sub">證交所盤後資料 · 走代理</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <div class="update-time" id="updateTime">未更新</div>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">🔄 重新抓取</button>
  </div>
</div>

<div class="banner" id="banner"></div>

<div class="hero">
  <div class="hero-title">⭐ 今日交易推薦</div>
  <div class="top-recs">
    <div class="rec-panel strong">
      <div class="rec-header"><div class="rec-type s">⭐ 強勢候選</div><div class="rec-count" id="sC">— 檔</div></div>
      <div class="rec-list" id="sList"></div>
    </div>
    <div class="rec-panel dt">
      <div class="rec-header"><div class="rec-type d">🔥 隔日沖優選</div><div class="rec-count" id="dC">— 檔</div></div>
      <div class="rec-list" id="dList"></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="info">
    💡 <b>資料：證交所 MI_INDEX（13:35 後即有）</b>。透過 CORS 代理抓取。<b>離高%</b> = (高-收)/高，越小越強。
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-v" id="stT">—</div><div class="stat-l">全市場</div></div>
    <div class="stat"><div class="stat-v" id="stU" style="color:var(--red)">—</div><div class="stat-l">上漲</div></div>
    <div class="stat"><div class="stat-v" id="stD" style="color:var(--green)">—</div><div class="stat-l">下跌</div></div>
    <div class="stat"><div class="stat-v" id="stS" style="color:var(--red)">—</div><div class="stat-l">強勢</div></div>
    <div class="stat"><div class="stat-v" id="stDT" style="color:var(--orange)">—</div><div class="stat-l">隔日沖</div></div>
  </div>

  <div class="section-h">
    <div style="font-size:11px;font-weight:700;color:var(--muted)">📋 全市場清單</div>
    <div class="tabs">
      <button class="tab active" data-f="all" onclick="setF(this)">全部</button>
      <button class="tab" data-f="strong" onclick="setF(this)">強勢</button>
      <button class="tab" data-f="dt" onclick="setF(this)">隔日沖</button>
      <button class="tab" data-f="rise" onclick="setF(this)">上漲</button>
      <button class="tab" data-f="big" onclick="setF(this)">大漲≥5%</button>
    </div>
  </div>

  <div class="tw">
    <table>
      <thead><tr>
        <th class="left">股票</th>
        <th>收盤</th><th>漲幅%</th><th>離高%</th><th>振幅%</th>
        <th>開盤</th><th>最高</th><th>最低</th><th>成交量</th>
        <th>評分</th><th>結論</th><th>隔日沖</th><th>停損</th><th>目標</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>
<script>
var stockData = [];
var currentFilter = 'all';

var PROXIES = [
  function(url) { return 'https://corsproxy.io/?url=' + encodeURIComponent(url); },
  function(url) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url); },
  function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
  function(url) { return 'https://api.cors.lol/?url=' + encodeURIComponent(url); }
];

function showBanner(type, msg) {
  var b = document.getElementById('banner');
  b.className = 'banner show ' + type;
  b.innerHTML = msg;
}

function hideBanner() {
  document.getElementById('banner').classList.remove('show');
}

async function fetchViaProxy(url) {
  for (var i = 0; i < PROXIES.length; i++) {
    try {
      var ctrl = new AbortController();
      var tid = setTimeout(function(){ctrl.abort();}, 15000);
      var r = await fetch(PROXIES[i](url), { signal: ctrl.signal });
      clearTimeout(tid);
      if (!r.ok) continue;
      var txt = await r.text();
      try { return JSON.parse(txt); } catch(e) { continue; }
    } catch(e) {
      console.error('proxy ' + i + ' err', e);
    }
  }
  return null;
}

function num(v) {
  if (v === null || v === undefined || v === '' || v === '--') return 0;
  var n = parseFloat(String(v).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}

async function fetchAll() {
  showBanner('loading', '📡 嘗試 MI_INDEX（13:35 後資料）...');
  var d1 = await fetchViaProxy('https://www.twse.com.tw/rwd/zh/afterTrading/MI_INDEX?type=ALLBUT0999&response=json');
  if (d1 && d1.tables) {
    for (var j = 0; j < d1.tables.length; j++) {
      var t = d1.tables[j];
      if (t.fields && t.data && t.data.length > 50) {
        var hasCode = false;
        for (var k = 0; k < t.fields.length; k++) {
          if (String(t.fields[k]).indexOf('證券代號') >= 0) { hasCode = true; break; }
        }
        if (hasCode) {
          var rows = parseMI(t);
          if (rows.length > 0) {
            return { data: rows, source: 'MI_INDEX' };
          }
        }
      }
    }
  }
  
  showBanner('loading', '📡 試 STOCK_DAY_ALL（21:00 後資料）...');
  var d2 = await fetchViaProxy('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
  if (Array.isArray(d2) && d2.length > 0) {
    return { data: d2, source: 'STOCK_DAY_ALL' };
  }
  
  return { data: [], source: null };
}

function parseMI(table) {
  var idx = { code:-1, name:-1, open:-1, high:-1, low:-1, close:-1, volume:-1, change:-1, sign:-1 };
  for (var i = 0; i < table.fields.length; i++) {
    var f = String(table.fields[i]);
    if (f.indexOf('證券代號') >= 0) idx.code = i;
    else if (f.indexOf('證券名稱') >= 0) idx.name = i;
    else if (f.indexOf('開盤價') >= 0) idx.open = i;
    else if (f.indexOf('最高價') >= 0) idx.high = i;
    else if (f.indexOf('最低價') >= 0) idx.low = i;
    else if (f.indexOf('收盤價') >= 0) idx.close = i;
    else if (f.indexOf('成交股數') >= 0) idx.volume = i;
    else if (f.indexOf('漲跌價差') >= 0) idx.change = i;
    else if (f === '漲跌(+/-)') idx.sign = i;
  }
  if (idx.code < 0 || idx.close < 0) return [];
  
  var result = [];
  for (var i = 0; i < table.data.length; i++) {
    var row = table.data[i];
    if (!row || !row[idx.code]) continue;
    var changeStr = String(row[idx.change] || '0');
    var changeVal = num(changeStr.replace(/[^0-9.]/g, ''));
    var signStr = String(row[idx.sign] || '');
    if (signStr.indexOf('green') >= 0 || signStr.indexOf('-') >= 0) changeVal = -changeVal;
    
    result.push({
      Code: String(row[idx.code]).trim(),
      Name: String(row[idx.name] || '').trim(),
      OpeningPrice: row[idx.open],
      HighestPrice: row[idx.high],
      LowestPrice: row[idx.low],
      ClosingPrice: row[idx.close],
      TradeVolume: row[idx.volume],
      Change: changeVal
    });
  }
  return result;
}

function analyze(s) {
  try {
    var code = String(s.Code || '').trim();
    var name = String(s.Name || '').trim();
    var open = num(s.OpeningPrice);
    var high = num(s.HighestPrice);
    var low = num(s.LowestPrice);
    var close = num(s.ClosingPrice);
    var change = typeof s.Change === 'number' ? s.Change : num(s.Change);
    var volume = num(s.TradeVolume);
    
    if (!code || !name || close <= 0) return null;
    if (!/^\d{4,6}$/.test(code)) return null;
    if (code.startsWith('00') && code.length === 4) return null;
    
    var yest = close - change;
    var changePct = yest > 0 ? change / yest : 0;
    var highGap = high > 0 ? (high - close) / high : 0;
    var amplitude = yest > 0 ? (high - low) / yest : 0;
    var upperShadow = high > close && close > 0 ? (high - close) / close : 0;
    
    var score = 0;
    if (changePct >= 0.07) score += 3;
    else if (changePct >= 0.05) score += 2;
    else if (changePct >= 0.03) score += 1.5;
    else if (changePct >= 0.01) score += 1;
    
    if (highGap <= 0.005) score += 3;
    else if (highGap <= 0.01) score += 2.5;
    else if (highGap <= 0.02) score += 2;
    else if (highGap <= 0.03) score += 1;
    
    if (close > open && open > 0) {
      var body = (close - open) / open;
      if (body >= 0.03) score += 2;
      else if (body >= 0.01) score += 1.5;
      else score += 1;
    }
    
    if (volume >= 5000000) score += 2;
    else if (volume >= 1000000) score += 1.5;
    else if (volume >= 500000) score += 1;
    
    if (score > 10) score = 10;
    score = Math.round(score * 10) / 10;
    
    var conclusion = '不買';
    if (score >= 8 && changePct > 0 && highGap <= 0.02) conclusion = '優先候選';
    else if (score >= 6 && changePct > 0) conclusion = '可觀察';
    
    var dt = changePct >= 0.03 && changePct < 0.095 && highGap <= 0.02 && close > open && upperShadow < 0.03 && score >= 7;
    
    return {
      code: code, name: name,
      closingPrice: close, change: change, changePct: changePct,
      highGap: highGap, amplitude: amplitude,
      openingPrice: open, highestPrice: high, lowestPrice: low,
      tradeVolume: volume,
      score: score, conclusion: conclusion, dt: dt,
      stopPrice: close * 0.98, targetPrice: close * 1.03
    };
  } catch(e) {
    return null;
  }
}

async function refresh() {
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 抓取中...';
  
  try {
    var result = await fetchAll();
    
    if (!result.data || result.data.length === 0) {
      showBanner('error', '❌ 所有代理都連不上證交所。請等 1 分鐘後再試。');
      btn.disabled = false;
      btn.textContent = '🔄 重新抓取';
      return;
    }
    
    var results = [];
    for (var i = 0; i < result.data.length; i++) {
      var r = analyze(result.data[i]);
      if (r) results.push(r);
    }
    
    stockData = results;
    
    var now = new Date();
    document.getElementById('updateTime').textContent = '✓ ' + now.toLocaleTimeString('zh-TW');
    
    try {
      localStorage.setItem('sd', JSON.stringify(stockData));
      localStorage.setItem('lu', now.toISOString());
    } catch(e) {}
    
    showBanner('success', '✓ 完成！來源：' + result.source + '，共 ' + stockData.length + ' 檔');
    setTimeout(hideBanner, 5000);
    
    render();
  } catch(e) {
    showBanner('error', '❌ 錯誤：' + e.message);
  }
  
  btn.disabled = false;
  btn.textContent = '🔄 重新抓取';
}

function render() { renderRecs(); renderStats(); renderTable(); }

function renderRecs() {
  var strong = stockData.filter(function(s){return s.conclusion === '優先候選';}).sort(function(a,b){return b.score - a.score;}).slice(0,5);
  var dt = stockData.filter(function(s){return s.dt;}).sort(function(a,b){return b.score - a.score;}).slice(0,5);
  
  document.getElementById('sC').textContent = stockData.filter(function(s){return s.conclusion === '優先候選';}).length + ' 檔';
  document.getElementById('dC').textContent = stockData.filter(function(s){return s.dt;}).length + ' 檔';
  
  function renderList(arr, id) {
    var html = '';
    if (arr.length === 0) {
      html = '<div class="rec-empty">今日無符合條件的標的</div>';
    } else {
      for (var i = 0; i < arr.length; i++) {
        var s = arr[i];
        html += '<div class="rec-item"><div class="rec-rank' + (i===0?' r1':'') + '">' + (i+1) + '</div>';
        html += '<div><div class="rec-name">' + s.name + '</div>';
        html += '<div class="rec-meta">' + s.code + ' · 漲' + (s.changePct*100).toFixed(2) + '% · 離高 ' + (s.highGap*100).toFixed(2) + '%</div></div>';
        html += '<div class="rec-score">' + s.score + '</div></div>';
      }
    }
    document.getElementById(id).innerHTML = html;
  }
  
  renderList(strong, 'sList');
  renderList(dt, 'dList');
}

function renderStats() {
  document.getElementById('stT').textContent = stockData.length;
  document.getElementById('stU').textContent = stockData.filter(function(s){return s.change > 0;}).length;
  document.getElementById('stD').textContent = stockData.filter(function(s){return s.change < 0;}).length;
  document.getElementById('stS').textContent = stockData.filter(function(s){return s.score >= 8;}).length;
  document.getElementById('stDT').textContent = stockData.filter(function(s){return s.dt;}).length;
}

function getScoreClass(s) {
  if (s >= 9) return 's-9';
  if (s >= 7) return 's-7';
  if (s >= 5) return 's-5';
  return 's-l';
}

function fmtVol(v) {
  if (v >= 100000000) return (v/100000000).toFixed(1) + '億';
  if (v >= 10000) return Math.round(v/10000) + '萬';
  return v.toLocaleString();
}

function renderTable() {
  var list = stockData.slice();
  if (currentFilter === 'strong') list = list.filter(function(s){return s.conclusion === '優先候選';});
  else if (currentFilter === 'dt') list = list.filter(function(s){return s.dt;});
  else if (currentFilter === 'rise') list = list.filter(function(s){return s.changePct > 0;});
  else if (currentFilter === 'big') list = list.filter(function(s){return s.changePct >= 0.05;});
  
  list.sort(function(a,b){return b.score - a.score;});
  if (list.length > 300) list = list.slice(0, 300);
  
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    var cc = s.change > 0 ? 'pos' : (s.change < 0 ? 'neg' : 'zero');
    var ct = (s.change >= 0 ? '+' : '') + (s.changePct*100).toFixed(2) + '%';
    var tag = s.conclusion === '優先候選' ? 't-buy' : (s.conclusion === '可觀察' ? 't-watch' : 't-skip');
    
    html += '<tr' + (s.conclusion === '優先候選' ? ' class="pri"' : '') + '>';
    html += '<td class="left"><div class="name">' + s.name + '</div><div class="code">' + s.code + '</div></td>';
    html += '<td>' + s.closingPrice.toFixed(2) + '</td>';
    html += '<td class="' + cc + '">' + ct + '</td>';
    html += '<td>' + (s.highGap*100).toFixed(2) + '%</td>';
    html += '<td>' + (s.amplitude*100).toFixed(2) + '%</td>';
    html += '<td>' + s.openingPrice.toFixed(2) + '</td>';
    html += '<td class="pos">' + s.highestPrice.toFixed(2) + '</td>';
    html += '<td class="neg">' + s.lowestPrice.toFixed(2) + '</td>';
    html += '<td>' + fmtVol(s.tradeVolume) + '</td>';
    html += '<td><span class="score-b ' + getScoreClass(s.score) + '">' + s.score + '</span></td>';
    html += '<td><span class="tag ' + tag + '">' + s.conclusion + '</span></td>';
    html += '<td>' + (s.dt ? '🔥' : '—') + '</td>';
    html += '<td class="neg">' + s.stopPrice.toFixed(2) + '</td>';
    html += '<td class="pos">' + s.targetPrice.toFixed(2) + '</td>';
    html += '</tr>';
  }
  
  if (!html) html = '<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--muted)">無資料，請點重新抓取</td></tr>';
  document.getElementById('tb').innerHTML = html;
}

function setF(btn) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  currentFilter = btn.getAttribute('data-f');
  renderTable();
}

try {
  var c = localStorage.getItem('sd');
  if (c) {
    stockData = JSON.parse(c);
    var lu = localStorage.getItem('lu');
    if (lu) document.getElementById('updateTime').textContent = '快取 ' + new Date(lu).toLocaleTimeString('zh-TW');
    render();
  }
} catch(e) {}

setTimeout(refresh, 300);
</script>
